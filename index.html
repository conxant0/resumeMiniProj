<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mac Desktop Resume</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <main class="desktop">
      <div class="menuBar">
        <div class="leftMenu">
          <img class="menuLogo" src="assets/logo.png" alt="Logo" />
          <span class="appName">JezreelOS</span>
          <span>File</span>
          <span>Edit</span>
          <span>View</span>
          <span>Go</span>
          <span>Window</span>
          <span>Help</span>
        </div>
        <div class="rightMenu">
          <img
            class="statusIcon batteryIcon"
            src="assets/battery.png"
            alt="Battery"
          />
          <img class="statusIcon wifiIcon" src="assets/wifi.png" alt="Wi-Fi" />
          <span>Settings</span>
          <span class="dateTime"></span>
        </div>
      </div>
      <div class="dock">
        <div class="dockApps">
          <img class="dockIcon github" src="assets/github.png" alt="Github" />
          <img class="dockIcon linkedin" src="assets/linkedin.png" alt="Linkedin" />
          <img class="dockIcon gmail" src="assets/gmail.png" alt="Gmail" />
          <img class="dockIcon resume" src="assets/resume.png" alt="Resume" />
        </div>
      </div>
    </main>
  </body>
</html>
