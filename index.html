<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mac Desktop Resume</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <main class="desktop">
      <div class="menuBar">
        <div class="leftMenu">
          <img class="menuLogo" src="assets/logo.png" alt="Logo" />
          <span class="appName">JezreelOS</span>
          <span class="desktopOnly">File</span>
          <span class="desktopOnly">Edit</span>
          <span class="desktopOnly">View</span>
          <span class="desktopOnly">Go</span>
          <span class="desktopOnly">Window</span>
          <span class="desktopOnly">Help</span>
        </div>
        <div class="rightMenu">
          <img
            class="statusIcon batteryIcon"
            src="assets/battery.png"
            alt="Battery"
          />
          <img class="statusIcon wifiIcon" src="assets/wifi.png" alt="Wi-Fi" />
          <span class="desktopOnly">Settings</span>
          <span class="dateTime"></span>
        </div>
      </div>
      <div class="folders">
        <div class="folder aboutFolder">
          <img
            class="folderIcon aboutMe"
            src="assets/folder.png"
            alt="About Me"
          />
          <span>About Me</span>
        </div>
        <div class="folder skillsFolder">
          <img class="folderIcon skills" src="assets/folder.png" alt="Skills" />
          <span>Skills</span>
        </div>
        <div class="folder educationFolder">
          <img
            class="folderIcon education"
            src="assets/folder.png"
            alt="Education"
          />
          <span>Education</span>
        </div>
        <div class="folder projectsFolder">
          <img
            class="folderIcon projects"
            src="assets/folder.png"
            alt="Projects"
          />
          <span>Projects</span>
        </div>
        <div class="folder contactFolder">
          <img
            class="folderIcon contact"
            src="assets/folder.png"
            alt="Contact"
          />
          <span>Contact</span>
        </div>
      </div>
      <div class="windows">
        <div class="folderWindow aboutWindow hidden">
          <div class="windowBar">
            <div class="windowButtons">
              <button class="windowButton closeButton"></button>
              <button class="windowButton minimizeButton"></button>
              <button class="windowButton expandButton"></button>
            </div>
            <span class="windowTitle">About Me</span>
          </div>
          <div class="windowContent">
            <h2>About Me</h2>
          </div>
        </div>
        <div class="folderWindow skillsWindow hidden">
          <div class="windowBar">
            <div class="windowButtons">
              <button class="windowButton closeButton"></button>
              <button class="windowButton minimizeButton"></button>
              <button class="windowButton expandButton"></button>
            </div>
            <span class="windowTitle">Skills</span>
          </div>
          <div class="windowContent">
            <h2>Skills & Programming Languages</h2>
          </div>
        </div>
        <div class="folderWindow educationWindow hidden">
          <div class="windowBar">
            <div class="windowButtons">
              <button class="windowButton closeButton"></button>
              <button class="windowButton minimizeButton"></button>
              <button class="windowButton expandButton"></button>
            </div>
            <span class="windowTitle">Education</span>
          </div>
          <div class="windowContent">
            <h2>Education</h2>
          </div>
        </div>
        <div class="folderWindow projectsWindow hidden">
          <div class="windowBar">
            <div class="windowButtons">
              <button class="windowButton closeButton"></button>
              <button class="windowButton minimizeButton"></button>
              <button class="windowButton expandButton"></button>
            </div>
            <span class="windowTitle">Projects</span>
          </div>
          <div class="windowContent">
            <h2>Projects Done and Contributions</h2>
          </div>
        </div>
        <div class="folderWindow contactWindow hidden">
          <div class="windowBar">
            <div class="windowButtons">
              <button class="windowButton closeButton"></button>
              <button class="windowButton minimizeButton"></button>
              <button class="windowButton expandButton"></button>
            </div>
            <span class="windowTitle">Contact</span>
          </div>
          <div class="windowContent">
            <h2>Contact</h2>
          </div>
        </div>
      </div>
      <div class="dock">
        <div class="dockApps">
          <a href="https://github.com/conxant0" target="_blank">
            <img class="dockIcon github" src="assets/github.png" alt="Github" />
          </a>
          <a
            href="https://www.linkedin.com/in/jezreelchadlumbab/"
            target="_blank"
          >
            <img
              class="dockIcon linkedin"
              src="assets/linkedin.png"
              alt="Linkedin"
            />
          </a>
          <a href="mailto:jglumbab@gmail.com">
            <img class="dockIcon gmail" src="assets/gmail.png" alt="Gmail" />
          </a>
          <a
            href="https://drive.google.com/file/d/1-3NNxwtmYo1BzhltLqZ_vTLB6Aj3u4Kf/view?usp=sharing"
            target="_blank"
          >
            <img class="dockIcon resume" src="assets/resume.png" alt="Resume" />
          </a>
        </div>
      </div>
    </main>
  </body>
</html>
