<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mac Desktop Resume</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <main class="desktop">
      <div class="menuBar">
        <div class="leftMenu">
          <img class="menuLogo" src="assets/logo.png" alt="Logo" />
          <span class="appName">JezreelOS</span>
          <span class="desktopOnly">File</span>
          <span class="desktopOnly">Edit</span>
          <span class="desktopOnly">View</span>
          <span class="desktopOnly">Go</span>
          <span class="desktopOnly">Window</span>
          <span class="desktopOnly">Help</span>
        </div>
        <div class="rightMenu">
          <img
            class="statusIcon batteryIcon"
            src="assets/battery.png"
            alt="Battery"
          />
          <img class="statusIcon wifiIcon" src="assets/wifi.png" alt="Wi-Fi" />
          <span class="desktopOnly">Settings</span>
          <span class="dateTime"></span>
        </div>
      </div>
      <div class="dock">
        <div class="dockApps">
          <a href="https://github.com/conxant0" target="_blank">
            <img class="dockIcon github" src="assets/github.png" alt="Github" />
          </a>
          <a
            href="https://www.linkedin.com/in/jezreelchadlumbab/"
            target="_blank"
          >
            <img
              class="dockIcon linkedin"
              src="assets/linkedin.png"
              alt="Linkedin"
            />
          </a>
          <a href="mailto:jglumbab@gmail.com">
            <img class="dockIcon gmail" src="assets/gmail.png" alt="Gmail" />
          </a>
          <a
            href="https://drive.google.com/file/d/1-3NNxwtmYo1BzhltLqZ_vTLB6Aj3u4Kf/view?usp=sharing"
            target="_blank"
          >
            <img class="dockIcon resume" src="assets/resume.png" alt="Resume" />
          </a>
        </div>
      </div>
    </main>
  </body>
</html>
